name: Java CI/CD with Docker

on:
  push:
    branches: [ "main", "master" ] # Gatilho: Executa ao fazer push na main
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        # Executa testes unitários e build do JAR
        run: mvn clean package -Dmaven.gitcommitid.skip=true

      - name: Generate JaCoCo Report
        run: mvn jacoco:report

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        # Constrói a imagem baseada no seu Dockerfile
        run: docker build -t delivery-api:${{ github.sha }} .

  deploy-homolog:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Staging
        # Simulação de deploy automático
        run: |
          echo "Realizando deploy automático em ambiente de homologação..."
          echo "Validando saúde da aplicação via /actuator/health"
